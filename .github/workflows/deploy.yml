name: Deploy to Vercel (Production)

# Publica na Vercel a cada push na main. Contorna o descompasso de contas
# (GitHub gabrielassisCT x Vercel GabrAssis) usando GitHub Actions em vez da
# Vercel GitHub App. O git push do skill atualizar-pipeline-26-27 dispara isto.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: vercel-prod
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to production
        run: vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
